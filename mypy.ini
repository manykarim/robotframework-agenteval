[mypy]
# Story 1a.1 bootstrap: strict mode on src/AgentEval/; will exercise as Epic 1b
# kernel modules land. Empty package passes trivially.
python_version = 3.12
strict = True
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True
files = src/AgentEval

# Third-party deps without complete stubs — silence mypy until upstream improves.
[mypy-mcp.*]
ignore_missing_imports = True

[mypy-litellm.*]
ignore_missing_imports = True

[mypy-robot.*]
ignore_missing_imports = True

[mypy-pabot.*]
ignore_missing_imports = True
