[mypy]
# Story 1a.1 bootstrap: strict mode on src/AgentEval/; will exercise as Epic 1b
# kernel modules land. Empty package passes trivially.
python_version = 3.12
strict = True
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True
files = src/AgentEval

# Third-party deps without complete stubs — silence mypy until upstream improves.
[mypy-mcp.*]
ignore_missing_imports = True

[mypy-litellm.*]
ignore_missing_imports = True

[mypy-robot.*]
ignore_missing_imports = True

[mypy-pabot.*]
ignore_missing_imports = True

# Story 2.1: robotlibcore is the upstream pythonlibcore DynamicCore source.
# It does not ship a py.typed marker (upstream issue tracked at
# robotframework/PythonLibCore); silence mypy until that lands.
[mypy-robotlibcore.*]
ignore_missing_imports = True

# Story 2.1: PyYAML ships types-PyYAML separately; not adding a dev dep
# for a single import. Silence per-module instead.
[mypy-yaml.*]
ignore_missing_imports = True

# Story 2.3: jsonschema ships types-jsonschema separately; same pattern.
[mypy-jsonschema.*]
ignore_missing_imports = True

# Story 10.1: `claude-agent-sdk` PyPI package is an optional extra under
# `[claude-sdk]`. Adapter at `coding_agent/claude_agent_sdk.py` lazy-imports
# it; type stubs aren't shipped (pre-1.0 SDK). Allow missing imports so
# default mypy runs pass without the extra installed.
[mypy-claude_agent_sdk.*]
ignore_missing_imports = True

# Story 10.2: `openai-agents` PyPI package imports as `agents` (NOT
# `openai_agents`). Optional extra under `[openai-agents]`. Same rationale
# as the claude-agent-sdk allowlist above.
[mypy-agents.*]
ignore_missing_imports = True
