# conformance.yml — Per-release Tier-1 adapter conformance harness
#
# Purpose: Runs tests/conformance/ against all Tier-1 adapters registered in the
# `agenteval.coding_agents` entry-point group. Catches adapter implementations
# that drift from the conformance contract.
#
# AC reference: AC-1a.2.3 (conformance.yml), AC-1a.2.9 (workflow hygiene).
#
# Story 1b.5 (2026-05-19) replaced the `--collect-only` placeholder with a real
# `pytest tests/conformance -q` invocation. At end-of-Story-1b.5 the empty
# entry-point set + skeleton per-AC test files cause every test to SKIP via
# `pytest.skip("Owning epic N not yet shipped")` markers; pytest returns 0.
# Concrete adapters in Epic 4 Story 4.1 (Generic LiteLLM) + Story 4.2 (Claude
# Code CLI) start exercising the 6 fixtures (generic + claude_code_cli ×
# echo_simple/echo_truncated/echo_external_mcp) against the harness.
#
# Trigger rationale: Per architecture L1174 "Per-release: tests/conformance/ runs
# against all Tier-1 adapters". `release.types: [published]` triggers when a GitHub
# release is published; `workflow_dispatch` allows manual runs during dev iteration.
# Not added to PR-gating ci.yml because conformance is SDK-version-pinned + slow.

name: conformance

on:
  workflow_dispatch: {}
  release:
    types: [published]

permissions:
  contents: read

jobs:
  conformance:
    name: conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set Python version
        run: echo "3.12" > .python-version

      - name: Install dependencies
        run: uv sync --all-extras

      # Story 1b.5: real `pytest tests/conformance -q` invocation. At
      # end-of-Story-1b.5 all 10 per-AC test files + test_structural_shape.py
      # SKIP via `pytest.skip("Owning epic N not yet shipped")` markers; pytest
      # returns 0 with all-skipped output. Concrete adapters in Epic 4 + Epic
      # 11 start exercising the 6 fixtures against the harness.
      - name: pytest tests/conformance (Story 1b.5 real invocation)
        run: uv run pytest tests/conformance -q
