# ci.yml — PR-gating CI workflow
#
# Purpose: Runs on every PR + push to main. Gates merges on lint, format, typecheck,
# and (Phase-1) collect-only pytest invocations across unit + acceptance-smoke +
# acceptance-tier1 + unit/conventions test directories.
#
# AC reference: AC-1a.2.1 (ci.yml), AC-1a.2.9 (workflow hygiene), AC-1a.2.10 (no agentguard-drift-check.yml).
#
# Phase-1 placeholders documented per Dev Notes:
# - `pytest --collect-only` is used for all test directories because Story 1a.1 produced empty
#   tests/ directories (only .gitkeep + __init__.py). Running `pytest tests/unit -q` against an
#   empty dir yields exit-code-5 "no tests collected" which would fail CI red. `--collect-only`
#   exits 0 on empty dirs AND 0 on real test discovery — it's the right Phase-1 placeholder.
#   Each epic's first story that adds real tests MUST update this YAML to drop --collect-only.
#
# Linux-only matrix per D2.1 architect waiver (Story 0.2 review, 2026-05-17): macOS validation
# is a Phase-1.5 carry-over. Architecture's `Python 3.12+3.13 × Linux+macOS` is the eventual
# target; Phase-1 ships Linux-only and documents the gap.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set Python version
        run: echo "${{ matrix.python-version }}" > .python-version

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff format --check)
        run: uv run ruff format --check src/ tests/

      - name: Typecheck (mypy)
        run: uv run mypy src/

      # Story 1a.5 deliverable — defense-in-depth: pre-commit hook
      # (.pre-commit-config.yaml) catches local commits; this step catches
      # `git commit --no-verify` bypass. Both gates active.
      - name: License headers check (Apache 2.0)
        run: uv run python scripts/check-license-headers.py

      # tests/acceptance/tier1 has real tests as of Story 1a.6 (FR42 acceptance
      # test landed). EXECUTE the tests (not just collect) — exit-5 leniency
      # removed for this dir per Story 1a.6 code-review HIGH-1.
      - name: pytest tests/acceptance/tier1 (real tests)
        run: uv run pytest tests/acceptance/tier1 -q

      # tests/acceptance/smoke has 1 .robot smoke test as of Story 1a.6
      # (verifies Library AgentEval + Get Effective Config via RF static-library
      # discovery). EXECUTE the smoke test via robot (not pytest).
      - name: robot tests/acceptance/smoke (RF smoke tests)
        run: uv run robot --output NONE --report NONE --log NONE tests/acceptance/smoke

      # tests/unit has real kernel unit tests as of Story 1b.1 (54+ tests covering
      # _kernel/{context, tier, run_async}.py) plus Story 1b.6's conventions
      # tests (17 cases: 7 convention checks + 10 violation-detection per
      # Blind#12 fake-green-prevention patch). EXECUTE the tests (not just
      # collect) — exit-5 leniency retired for ALL of tests/unit per Story
      # 1b.6 CI-log-forensics fix; the prior `--ignore=tests/unit/conventions`
      # exclusion was a Story 1b.1 placeholder pending Story 1b.6 conventions
      # implementation, now removed.
      - name: pytest tests/unit (real tests)
        run: uv run pytest tests/unit -q

      # Story 2.1: RF integration test for the `Skill` sub-library lives at
      # tests/unit/skills/test_robot_integration.robot. pytest does not
      # discover .robot files, so invoke `robot` explicitly so CI surfaces
      # any regression in the DynamicCore-composed Skill keyword wiring.
      # `--exclude` filter on directories without `.robot` files keeps the
      # invocation focused; the AgentEval.skills.library.SkillsLibrary
      # import path is the load-bearing assertion.
      - name: robot tests/unit/skills (RF skills integration)
        run: uv run robot --output NONE --report NONE --log NONE tests/unit/skills/test_robot_integration.robot

      # Story 2.2: RF integration tests for the `Subagent` + `Hook`
      # sub-libraries. Same pattern as Story 2.1 — pytest doesn't
      # discover .robot files. CI surfaces regressions in
      # AgentEval.subagents.library.SubagentsLibrary + AgentEval.hooks.library.HooksLibrary
      # wiring (DynamicCore composition + standalone-import paths).
      - name: robot tests/unit/subagents (RF subagent integration)
        run: uv run robot --output NONE --report NONE --log NONE tests/unit/subagents/test_robot_integration.robot

      - name: robot tests/unit/hooks (RF hook integration)
        run: uv run robot --output NONE --report NONE --log NONE tests/unit/hooks/test_robot_integration.robot
