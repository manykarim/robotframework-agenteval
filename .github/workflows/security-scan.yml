# security-scan.yml — CodeQL SAST + supply-chain analysis
#
# Purpose: Runs CodeQL on every PR + push to main + weekly full-repo scan.
# Surfaces findings in PR annotations + the GitHub Security tab.
#
# AC reference: AC-1a.2.4 (security-scan.yml), AC-1a.2.9 (workflow hygiene),
# AC-1a.2.10 (replaces retired agentguard-drift-check.yml).
#
# REPLACES retired agentguard-drift-check.yml (originally proposed under retired
# NFR-MAINT-06 / ADR-A4). Per feedback_agentguard_inspiration_not_dependency memory
# + ADR-A4 retirement in Story 0.3: robotframework-agentguard is inspiration-only,
# not a dependency to drift-check against. CodeQL takes that workflow's slot.
#
# Python repos use CodeQL's interpreter mode — no autobuild step needed (pure-Python
# package; CodeQL analyzes .py source directly). If C extensions land in Phase 2+,
# add `github/codeql-action/autobuild@v3` between init + analyze.

name: security-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly full-repo scan: Monday 06:00 UTC.
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: codeql-analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # MED-1 fix (2026-05-17): bumped @v3 → @v4 to silence the December 2026
      # deprecation warning emitted on the first CI run.
      #
      # LOW-1a fix (2026-05-17, Round 2): paths-ignore is set via
      # .github/codeql/codeql-config.yml (NOT as a workflow input — CodeQL v4
      # rejects paths-ignore as an unexpected input; it's a config-file-only
      # setting). Round-1 attempt used the input form and was silently ignored,
      # leaving 12 spike/skill alerts open. Round-2 uses config-file: per
      # https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning#using-a-custom-configuration-file
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
