# dogfood-integration.yml — NFR-REL-05 cross-repo dogfood smoke check (Phase-1)
#
# Purpose: Per-release per NFR-REL-05, verifies the locally-built agenteval wheel
# installs cleanly into a fresh venv. Phase-1 scope is intentionally limited to
# install-smoke — real cross-repo integration (running rf-mcp +
# robotframework-agentskills test suites against the wheel) is gated on those
# repos actually adopting agenteval as a dependency, which happens in
# Story 9.1 + 9.2.
#
# AC reference: AC-1a.2.5 (dogfood-integration.yml), AC-1a.2.9 (workflow hygiene).
# NFR reference: NFR-REL-05 (dogfood integration).
#
# IMPORTANT — why Phase-1 is smoke-only (lesson learned 2026-05-17):
# Story 1a.2's first implementation cloned rf-mcp + robotframework-agentskills
# and ran THEIR pytest against ONLY the agenteval wheel installed in a clean
# venv. The downstream tests crashed at import time (ModuleNotFoundError on
# their own deps + own package) and `continue-on-error: true` masked the
# failures as success. That was fake-green CI — the workflow looked green but
# validated nothing. Honest framing: until rf-mcp + robotframework-agentskills
# actually import agenteval, there's nothing to dogfood. Story 9.1 + 9.2 close
# this gap. Until then, install-smoke is the truthful Phase-1 baseline.
#
# Trigger: release published, workflow_dispatch, AND PRs with the release-pending
# label. The label gate is enforced via an `if:` job-level expression.

name: dogfood-integration

on:
  workflow_dispatch: {}
  release:
    types: [published]
  pull_request:
    types: [labeled, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  dogfood:
    name: dogfood-integration (Phase-1 smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Phase-1: only run on PRs that explicitly carry the release-pending label.
    # release + workflow_dispatch always pass this gate.
    if: >
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'release-pending'))

    steps:
      - name: Checkout agenteval
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set Python version
        run: echo "3.12" > .python-version

      # MED-6 fix (2026-05-17): AC-1a.2.5 spec text requires uv sync --all-extras
      # before uv build. Original implementation skipped this.
      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build agenteval wheel
        run: |
          uv build
          ls -la dist/

      # Phase-1 honest smoke check: install the locally-built wheel into a clean
      # venv. If this fails, the wheel is broken and downstream consumers can't
      # use it. That's a real NFR-REL-05 signal. Real cross-repo testing waits
      # for Story 9.1 + 9.2.
      - name: Smoke check — agenteval wheel installs into clean venv
        run: |
          set -euo pipefail
          mkdir -p /tmp/dogfood-smoke
          cd /tmp/dogfood-smoke
          uv venv
          source .venv/bin/activate
          uv pip install "$GITHUB_WORKSPACE"/dist/*.whl
          python -c "import AgentEval; print(f'Smoke OK: AgentEval {AgentEval.__version__} installed cleanly into fresh venv')"

      - name: Phase-1 scope notice
        run: |
          echo "::notice::Phase-1 dogfood-integration is install-smoke ONLY."
          echo "::notice::Real cross-repo testing (rf-mcp + robotframework-agentskills running their suites against the wheel) waits for Story 9.1 + 9.2, when those repos adopt agenteval as a dependency."
          echo "::notice::Until then, there's nothing meaningful to test — running their tests against ONLY the agenteval wheel (no downstream deps) yields ModuleNotFoundError, not a real signal."

  parity-suite-smoke:
    name: rf-mcp parity-suite smoke (Story 9.1)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Story 9.1 / AC-9.1.3: extends the install-smoke job with a parity-suite
    # smoke check. Runs ONLY on workflow_dispatch + release (NOT on every PR)
    # because cloning rf-mcp + running its subprocess MCP server is heavier
    # than the install-smoke + isn't on the per-PR critical path until
    # rf-mcp adopts agenteval (per Story 9.1 D-2 path-of-least-amendment).
    if: >
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout agenteval
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set Python version
        run: echo "3.12" > .python-version

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Clone rf-mcp at pinned SHA
        run: |
          set -euo pipefail
          # Pinned per parity-checklist-rf-mcp-mcp-surface.md L3.
          RF_MCP_SHA="${{ vars.RF_MCP_PINNED_SHA || '235d679785fd4e5f647e9e760ec7da2a3d09b7ef' }}"
          git clone --depth=50 https://github.com/manykarim/rf-mcp /tmp/rf-mcp
          cd /tmp/rf-mcp
          git checkout "$RF_MCP_SHA"
          echo "RF_MCP_REPO_ROOT=/tmp/rf-mcp" >> "$GITHUB_ENV"

      - name: Install rf-mcp dependencies
        run: |
          cd /tmp/rf-mcp
          uv sync

      - name: Run agenteval rf-mcp parity suite
        env:
          RF_MCP_REPO_ROOT: /tmp/rf-mcp
        run: |
          set -euo pipefail
          uv run robot \
            --listener AgentEval.telemetry.listener.Listener \
            --output /tmp/rf-mcp-output.xml \
            --report NONE \
            --log NONE \
            tests/dogfood/rf-mcp/test_mcp_surface_parity.robot \
            tests/dogfood/rf-mcp/test_trace_observability_parity.robot

      - name: Story 9.1 parity-suite smoke status notice
        run: |
          echo "::notice::Story 9.1 parity-suite-smoke job ran the rf-mcp dogfood parity suite against the locally-modified agenteval source."
          echo "::notice::Cross-repo trigger (rf-mcp PRs blocking on agenteval regressions) requires rf-mcp adoption of agenteval — out of scope for this repo per Story 9.1 D-2."
