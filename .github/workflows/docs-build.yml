# docs-build.yml — NFR-MAINT-04 docs-build with section-presence enforcement
#
# Purpose: Builds RF libdoc + asserts every doc in docs/contracts/ contains the
# 4 architecture-mandated section headers: ## Purpose / ## Scope / ## Contract /
# ## Change Policy.
#
# AC reference: AC-1a.2.6 (docs-build.yml), AC-1a.2.9 (workflow hygiene).
# NFR reference: NFR-MAINT-04 (10 docs as first-class — section-presence enforcement).
#
# Phase-1 mechanic: grep-based section-presence check is the minimum-viable
# NFR-MAINT-04 enforcement. Full RF libdoc generation across populated keyword
# files lands when Epic 1b + later epics add real RF Library classes. Replacing
# grep with a richer libdoc-generated checker is a Phase-2 follow-up.
#
# Edge case: docs/contracts/ may be empty in Phase 1 (Story 1a.4 fills it).
# Workflow emits `::notice::` + exits 0 when the directory has no .md files.

name: docs-build

on:
  workflow_dispatch: {}
  release:
    types: [published]
  pull_request:
    branches: [main]
    paths:
      - "docs/contracts/**"
      - "src/AgentEval/**/*.py"

permissions:
  contents: read

jobs:
  docs-build:
    name: docs-build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set Python version
        run: echo "3.12" > .python-version

      - name: Install dependencies
        run: uv sync --all-extras

      # MED-4 fix (2026-05-17): sweep ALL submodules via pkgutil.walk_packages
      # instead of only importing top-level AgentEval. Broken submodules (syntax
      # errors, missing imports) are now caught before Story 1a.4 + Epic 1b add
      # real RF Library keyword classes.
      - name: Sweep-import all AgentEval submodules (Phase-1 libdoc placeholder)
        run: |
          uv run python -c "
          import importlib
          import pkgutil
          import sys

          import AgentEval

          failures = []
          modules_imported = 0
          for module_info in pkgutil.walk_packages(AgentEval.__path__, prefix='AgentEval.'):
              try:
                  importlib.import_module(module_info.name)
                  modules_imported += 1
              except Exception as exc:
                  failures.append((module_info.name, type(exc).__name__, str(exc)))

          print(f'AgentEval {AgentEval.__version__} — {modules_imported} submodules imported cleanly')
          if failures:
              print('::error::Submodule import failures:')
              for name, exc_type, msg in failures:
                  print(f'  - {name}: {exc_type}: {msg}')
              sys.exit(1)
          "

      # MED-3 fix (2026-05-17): per-file 4-distinct-section assertion instead of
      # aggregate header count. Previous implementation summed header occurrences
      # across all files which allowed false-pass: a file with 2x ## Purpose +
      # missing ## Contract would still pass if another file had a 5th header.
      - name: Assert NFR-MAINT-04 per-file section presence in docs/contracts/
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d docs/contracts ]; then
            echo "::warning::docs/contracts/ directory missing — Story 1a.4 creates it"
            exit 0
          fi

          mapfile -t files < <(find docs/contracts -maxdepth 1 -name "*.md" -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::notice::Docs-build skipped: docs/contracts/ has no .md files (Phase-1 placeholder; Story 1a.4 fills it)"
            exit 0
          fi

          fail=0
          required_sections=("Purpose" "Scope" "Contract" "Change Policy")
          for f in "${files[@]}"; do
            missing=()
            for section in "${required_sections[@]}"; do
              if ! grep -qE "^## ${section}\$" "$f"; then
                missing+=("## ${section}")
              fi
            done
            if [ "${#missing[@]}" -gt 0 ]; then
              echo "::error file=${f}::NFR-MAINT-04 violation: missing required section header(s): ${missing[*]}"
              fail=1
            else
              echo "::notice file=${f}::All 4 NFR-MAINT-04 sections present"
            fi
          done

          if [ "$fail" -eq 1 ]; then
            echo "::error::Each contract doc MUST contain: ## Purpose, ## Scope, ## Contract, ## Change Policy"
            exit 1
          fi
          echo "::notice::NFR-MAINT-04 per-file section-presence assertion passed for ${#files[@]} file(s)"
