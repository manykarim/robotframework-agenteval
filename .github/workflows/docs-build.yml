# docs-build.yml — NFR-MAINT-04 docs-build with section-presence enforcement
#
# Purpose: Builds RF libdoc + asserts every doc in docs/contracts/ contains the
# 4 architecture-mandated section headers: ## Purpose / ## Scope / ## Contract /
# ## Change Policy.
#
# AC reference: AC-1a.2.6 (docs-build.yml), AC-1a.2.9 (workflow hygiene).
# NFR reference: NFR-MAINT-04 (10 docs as first-class — section-presence enforcement).
#
# Phase-1 mechanic: grep-based section-presence check is the minimum-viable
# NFR-MAINT-04 enforcement. Full RF libdoc generation across populated keyword
# files lands when Epic 1b + later epics add real RF Library classes. Replacing
# grep with a richer libdoc-generated checker is a Phase-2 follow-up.
#
# Edge case: docs/contracts/ may be empty in Phase 1 (Story 1a.4 fills it).
# Workflow emits `::notice::` + exits 0 when the directory has no .md files.

name: docs-build

on:
  workflow_dispatch: {}
  release:
    types: [published]
  pull_request:
    branches: [main]
    paths:
      - "docs/contracts/**"
      - "src/AgentEval/**/*.py"

permissions:
  contents: read

jobs:
  docs-build:
    name: docs-build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set Python version
        run: echo "3.12" > .python-version

      - name: Install dependencies
        run: uv sync --all-extras

      # Phase-1 placeholder libdoc step: full libdoc invocation lands in Story 1a.4 +
      # Epic 1b once RF Library keyword classes exist. For now, just verify the
      # AgentEval package imports cleanly.
      - name: Verify AgentEval package imports (Phase-1 libdoc placeholder)
        run: uv run python -c "import AgentEval; print(f'AgentEval {AgentEval.__version__} imports OK')"

      # NFR-MAINT-04 section-presence assertion: every docs/contracts/*.md MUST contain
      # all 4 section headers. Edge case: directory empty in Phase 1 → notice + exit 0.
      - name: Assert NFR-MAINT-04 section presence in docs/contracts/
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d docs/contracts ]; then
            echo "::warning::docs/contracts/ directory missing — Story 1a.4 creates it"
            exit 0
          fi

          file_count=$(find docs/contracts -maxdepth 1 -name "*.md" -type f | wc -l)
          if [ "$file_count" -eq 0 ]; then
            echo "::notice::Docs-build skipped: docs/contracts/ has no .md files (Phase-1 placeholder; Story 1a.4 fills it)"
            exit 0
          fi

          expected_sections=$((4 * file_count))
          actual_sections=$(grep -c -hE '^## (Purpose|Scope|Contract|Change Policy)' docs/contracts/*.md 2>/dev/null | awk '{sum += $1} END {print sum+0}')

          echo "docs/contracts/ files: $file_count"
          echo "Expected section headers: $expected_sections (4 per file)"
          echo "Actual section headers: $actual_sections"

          if [ "$actual_sections" -lt "$expected_sections" ]; then
            echo "::error::NFR-MAINT-04 violation: $((expected_sections - actual_sections)) required section headers missing across docs/contracts/*.md"
            echo "::error::Each contract doc MUST contain: ## Purpose, ## Scope, ## Contract, ## Change Policy"
            exit 1
          fi

          echo "::notice::NFR-MAINT-04 section-presence assertion passed ($actual_sections / $expected_sections headers found)"
