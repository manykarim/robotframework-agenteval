# Lint + format config — agenteval Story 1a.1 bootstrap.
# Phase-1 minimal config; tightened per architecture.md §Pattern Categories Defined
# as sub-libraries land (Epic 1b onward).

target-version = "py312"
line-length = 120

extend-exclude = [
  ".venv",
  "build",
  "dist",
  "_bmad-output/spikes",  # spike scratch — not in lint scope
  "_bmad-output/implementation-artifacts",  # planning docs
]

[lint]
# Phase-1 starter rule set; extended per Epic 1b conventions tests.
select = [
  "E",      # pycodestyle errors
  "W",      # pycodestyle warnings
  "F",      # pyflakes
  "I",      # isort
  "B",      # flake8-bugbear
  "UP",     # pyupgrade (target py312)
  "C4",     # flake8-comprehensions
  "SIM",    # flake8-simplify
  "TID",    # flake8-tidy-imports
  "N",      # pep8-naming — backs docs/contracts/coding-conventions.md naming table (Story 1a.5 code-review MED-6)
]
ignore = [
  # N999 (Invalid module name): suppressed because agenteval intentionally uses
  # PascalCase `AgentEval` as the Python package name to match Robot Framework's
  # Library naming convention (RF Libraries are conventionally PascalCase like
  # `BuiltIn`, `Collections`, `String`, `Process`). The PyPI distribution name is
  # `robotframework-agenteval` (lowercase per PyPI convention) but the imported
  # Python package is `AgentEval`. This is an intentional convention deviation
  # documented in docs/contracts/coding-conventions.md §Naming Conventions.
  # Other N-series rules (N801 PascalCase classes, N802 lowercase_snake functions,
  # N806 lowercase_snake variables) ARE enforced.
  "N999",
]

[lint.per-file-ignores]
"tests/**" = ["E501"]  # tests may have longer literal data lines

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
